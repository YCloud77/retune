<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Zen Kaku Gothic New','Hiragino Sans','Helvetica Neue',sans-serif;overflow:hidden;color:#e8e8ff}
#wrap{position:relative;width:100vw;height:100vh;max-width:440px;max-height:900px}
canvas{display:block;width:100%!important;height:100%!important;position:absolute;top:0;left:0}
#c3d{z-index:1}
#c2d{z-index:2;opacity:0;transition:opacity 1s}

/* overlays */
.screen{position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 50% 35%,#10102a 0%,#070712 60%,#050510 100%);text-align:center;padding:32px 26px}
.hidden{display:none!important}
.fade-out{animation:fo 1s forwards}
@keyframes fo{to{opacity:0;visibility:hidden}}

/* title */
#title h1{font-size:34px;letter-spacing:0.42em;font-weight:200;color:#cfcff5;opacity:0;text-indent:0.42em;
  text-shadow:0 0 30px rgba(120,120,220,0.35);animation:ti 3.2s ease forwards}
@keyframes ti{0%{opacity:0;letter-spacing:0.7em}100%{opacity:1;letter-spacing:0.42em}}
#title .hint{margin-top:40px;font-size:12px;letter-spacing:0.25em;color:#6a6a90;opacity:0;animation:hb 2.4s ease 2.6s infinite}
@keyframes hb{0%,100%{opacity:0.25}50%{opacity:0.7}}
#title .langs{position:absolute;top:26px;right:22px}
.langSel{appearance:none;-webkit-appearance:none;font-family:inherit;font-size:11.5px;letter-spacing:0.14em;
  color:#c7c9ec;border:1px solid rgba(185,190,240,0.28);border-radius:18px;padding:7px 30px 7px 16px;
  background:rgba(18,18,40,0.55) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="8" height="5" viewBox="0 0 8 5"><path d="M0 0l4 5 4-5z" fill="%238d8dbd"/></svg>') no-repeat right 12px center;
  cursor:pointer;outline:none;backdrop-filter:blur(6px)}
.langSel:focus{border-color:rgba(185,190,240,0.55)}
.langSel option{background:#12122a;color:#e6e6fa}

/* legal */
#legal{justify-content:flex-start;padding-top:46px}
#legal h2{font-size:15px;letter-spacing:0.18em;color:#bfbfe8;font-weight:400;margin-bottom:14px}
#ldoc{width:100%;max-width:380px;height:46vh;overflow-y:auto;text-align:left;font-size:12.5px;line-height:1.95;color:#b8b8d4;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 16px;-webkit-overflow-scrolling:touch}
#ldoc h3{font-size:13px;color:#dadaf5;margin:14px 0 4px;letter-spacing:0.06em}
#ldoc h3:first-child{margin-top:0}
#ldoc .warn{color:#ffd9b0;font-weight:600}
#ldoc .end{margin-top:16px;text-align:center;color:#55557a;font-size:11px;letter-spacing:0.2em}
#safety{max-width:380px;margin-top:16px;font-size:12.5px;line-height:1.7;color:#ffcfa6;
  border:1px solid rgba(255,180,120,0.28);border-radius:12px;padding:12px 14px;background:rgba(255,150,80,0.06)}
.consent{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:13px;color:#c8c8e4;cursor:pointer;max-width:380px}
.consent input{width:20px;height:20px;accent-color:#8a8ad8;flex:0 0 auto}
.consent.disabled{opacity:0.4;pointer-events:none}
#scrollnote{margin-top:8px;font-size:11px;color:#6a6a90;letter-spacing:0.12em}
.primary{margin-top:18px;font-size:14px;letter-spacing:0.22em;color:#0c0c18;background:linear-gradient(90deg,#9a9ae0,#b9b9f0);
  border:none;border-radius:26px;padding:13px 44px;cursor:pointer;font-weight:600;transition:opacity .3s}
.primary:disabled{opacity:0.3;cursor:default}

/* loading (during experience start if model not ready) */
#loading{position:absolute;inset:0;z-index:55;display:none;flex-direction:column;align-items:center;justify-content:center;background:#050510}
#lt{font-size:13px;color:#5a5a80;letter-spacing:0.2em}
#lb{width:160px;height:2px;background:#1a1a28;border-radius:2px;margin-top:14px;overflow:hidden}
#lf{height:100%;width:0%;background:linear-gradient(90deg,#4a4a70,#8080b0);border-radius:2px;transition:width .3s}

/* experience HUD */
#nar{position:absolute;bottom:120px;left:24px;right:24px;text-align:center;pointer-events:none;z-index:30;opacity:0;transition:opacity .8s}
#nt{display:inline-block;text-align:left;max-width:400px;
  font-family:'Shippori Mincho','Hiragino Mincho ProN',serif;
  font-size:16.5px;line-height:2.05;color:rgba(240,240,252,0.95);font-weight:500;letter-spacing:0.07em;
  text-shadow:0 0 18px #000,0 0 42px rgba(0,0,0,0.85)}
#nt .q{color:#ffe9c4;font-weight:400}
#hud{position:absolute;bottom:30px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;z-index:30;opacity:0;transition:opacity .6s}
#sl{font-size:9px;letter-spacing:0.25em;color:#5a5a72;text-transform:uppercase}
#pb{width:200px;height:2px;background:#1a1a28;border-radius:2px;overflow:hidden}
#pf{height:100%;background:linear-gradient(90deg,#5a5a82,#8a8ac0);width:0%;border-radius:2px}
#tl{font-size:10px;letter-spacing:0.18em;color:#3a3a50}
#ctrl{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:40;display:none;gap:10px}
#ctrl button{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:0.12em;padding:7px 18px;border-radius:24px;cursor:pointer}

/* end */
#end{z-index:62}
#end .msg{display:none}
#end .primary{font-family:'Shippori Mincho','Hiragino Mincho ProN',serif;font-size:14.5px;font-weight:500;
  letter-spacing:0.3em;text-indent:0.3em;color:#101026;padding:17px 20px;width:min(300px,76vw);border:none;border-radius:34px;
  background:linear-gradient(135deg,#d6dbfa 0%,#aab0ee 60%,#9ba2ea 100%);
  box-shadow:0 8px 34px rgba(150,160,255,0.28),inset 0 1px 0 rgba(255,255,255,0.55);cursor:pointer}
#end .primary:active{transform:translateY(1px)}
#end .ghostBtn{font-family:'Shippori Mincho','Hiragino Mincho ProN',serif;font-size:12.5px;font-weight:500;
  letter-spacing:0.28em;text-indent:0.28em;color:#c3c8ef;padding:15px 20px;width:min(300px,76vw);
  border:1px solid rgba(195,200,240,0.32);border-radius:34px;background:rgba(16,16,38,0.45);
  backdrop-filter:blur(8px);margin-top:16px;cursor:pointer}
#end .ghostBtn:active{background:rgba(195,200,240,0.12)}
#end .again{margin-top:8px}
.ghostBtn{margin-top:14px;font-size:12px;letter-spacing:0.2em;color:#9a9ac8;background:none;
  border:1px solid rgba(154,154,200,0.35);border-radius:24px;padding:10px 26px;cursor:pointer}
.ghostBtn:active{background:rgba(154,154,200,0.12)}
.jhead{font-size:15px;letter-spacing:0.3em;color:#d8d8f5;font-weight:300;margin-bottom:22px}
.jq{width:min(340px,84vw);margin-bottom:16px;text-align:left}
.jlabel{font-size:12.5px;letter-spacing:0.08em;color:#b9b9e2;line-height:1.7;margin-bottom:6px}
.jrow{display:flex;gap:8px;align-items:stretch}
.jrow textarea{flex:1;background:rgba(20,20,44,0.7);border:1px solid rgba(154,154,200,0.3);border-radius:10px;
  color:#e6e6fa;font-size:13px;line-height:1.6;padding:9px 11px;resize:none;font-family:inherit;outline:none}
.jrow textarea:focus{border-color:rgba(185,185,240,0.6)}
.mic{width:42px;border-radius:10px;border:1px solid rgba(154,154,200,0.3);background:rgba(20,20,44,0.7);
  font-size:16px;cursor:pointer;color:#e6e6fa}
.mic.rec{background:rgba(255,120,150,0.25);border-color:rgba(255,150,170,0.7)}
.jhint{font-size:10.5px;color:#7d7da8;letter-spacing:0.06em;margin:2px 0 4px;min-height:14px}
#jList{width:min(340px,84vw);max-height:52vh;overflow-y:auto;text-align:left}
.jent{border-bottom:1px solid rgba(154,154,200,0.18);padding:12px 2px}
.jdate{font-size:11px;letter-spacing:0.14em;color:#8d8dbd;margin-bottom:5px}
.jent div.jrow2{font-size:12.5px;color:#d3d3ee;line-height:1.65;margin-top:2px}
.jent .jk{color:#8d8dbd;font-size:11px}
</style>
</head>

<div id="wrap">
  <canvas id="c3d"></canvas>
  <canvas id="c2d"></canvas>

  <!-- Pre-0 Title -->
  <div id="title" class="screen">

    </select></div>
    <h1>RETUNE</h1>
    <div class="hint" id="titleHint">tap to begin</div>
  </div>

  <!-- Pre-1 Legal / consent -->
  <div id="legal" class="screen hidden">
    <h2 id="legalH">ご利用の前に</h2>
    <div id="ldoc"></div>
    <div id="scrollnote"></div>
    <label class="consent disabled" id="consentRow"><input type="checkbox" id="agree"><span id="agreeLabel"></span></label>
    <div id="safety"></div>
    <button class="primary" id="startBtn" disabled></button>
  </div>

  <!-- experience -->
  <div id="loading"><div id="lt">RETUNE</div><div id="lb"><div id="lf"></div></div></div>
  <div id="nar"><div id="nt"></div></div>
  <div id="hud"><div id="sl">RETUNE</div><div id="pb"><div id="pf"></div></div><div id="tl">0:00</div></div>

  <!-- end -->
  <div id="end" class="screen hidden"><div class="msg" id="endMsg"></div>
    <button class="primary again" id="journalBtn"></button>
    <button class="ghostBtn" id="skipBtn"></button>
    <button class="ghostBtn" id="againBtn"></button>
  </div>
  <div id="journal" class="screen hidden">
    <div class="jhead" id="jHead"></div>
    <div class="jq"><div class="jlabel" id="jl1"></div><div class="jrow"><textarea id="jt1" rows="2"></textarea><button class="mic" id="jm1">🎤</button></div></div>
    <div class="jq"><div class="jlabel" id="jl2"></div><div class="jrow"><textarea id="jt2" rows="2"></textarea><button class="mic" id="jm2">🎤</button></div></div>
    <div class="jq"><div class="jlabel" id="jl3"></div><div class="jrow"><textarea id="jt3" rows="2"></textarea><button class="mic" id="jm3">🎤</button></div></div>
    <div class="jhint" id="jHint"></div>
    <button class="primary" id="jSave"></button>
    <button class="ghostBtn" id="jHist"></button>
  </div>
  <div id="journalLog" class="screen hidden">
    <div class="jhead" id="jHead2"></div>
    <div id="jList"></div>
    <button class="ghostBtn" id="jBack"></button>
  </div>
</div>
<div id="ctrl"><button id="bp"></button><button id="br"></button></div>

var LEGAL={
  ja:`<h3>1. 本アプリについて</h3>RETUNE は、深呼吸とイメージング（視座の変化）を用いて、心身を落ち着け、意識状態を切り替えるためのセルフケア／リラクゼーション体験です。
<h3>2. 医療・効果に関する免責</h3>本アプリは医療行為・診断・治療ではありません。病気の治療や予防を目的とするものではなく、医師その他の専門家による助言の代替にはなりません。心身に不調・疾患のある方、通院中・服薬中の方、妊娠中の方は、ご利用前に専門家にご相談ください。
<h3>3. <span class="warn">安全に関する重要な注意</span></h3><span class="warn">運転中・自転車や乗り物の操作中・歩行中・機械や火気の取り扱い中・その他注意を要するいかなる状況でも、絶対に本アプリを使用しないでください。</span>本アプリは意識を内側に向け、視覚イメージに集中するため、周囲への注意が著しく低下します。必ず安全で、座るか横になれる落ち着いた場所で行ってください。気分が悪くなった場合は、すぐに中止してください。
<h3>4. 光・音について</h3>画面には光の演出が、音声にはナレーションや鐘の音が含まれます。光や音に過敏な方、てんかんの既往がある方はご注意ください。音量は事前に適切な大きさに調整してください。

<h3>6. 自己責任</h3>本アプリのご利用は、利用者ご自身の判断と責任において行うものとします。提供者は、利用に起因して生じたいかなる損害についても責任を負いません。
<div class="end">— 以上 —</div>`,
  en:`<h3>1. About this app</h3>RETUNE is a self-care / relaxation experience that uses deep breathing and imagery (a shift of perspective) to calm the mind and body and change your state of awareness.

<h3>3. <span class="warn">Important safety notice</span></h3><span class="warn">Never use this app while driving, operating any vehicle or machinery, walking, handling fire, or in any situation that requires your attention.</span> The experience turns your awareness inward and reduces attention to your surroundings. Use only in a safe, calm place where you can sit or lie down. Stop immediately if you feel unwell.

// ═══ AUDIO: bell (WebAudio singing bowl) + unlock ═══
var actx=null;
function unlockAudio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
function ringBell(){
  try{
    if(AUDIO_BASE){ var b=new Audio(AUDIO_BASE+'/bell.mp3'); b.play().catch(function(){synthBell();}); return; }
    synthBell();
  }catch(e){ try{synthBell();}catch(_){} }
}
function synthBell(){
  if(!actx) return;
  var now=actx.currentTime;
  // More natural singing bowl (2026-07-04): soft strike (no click), warm low fundamental,
  // and TWIN slightly-detuned voices per partial — their interference makes the slow
  // "wah-wah" beating that a real bowl has. Longer, quieter tail.
  var parts=[{f:196,g:0.42,d:8.0},{f:372,g:0.22,d:6.5},{f:667,g:0.10,d:5.0},{f:1053,g:0.05,d:3.6}];
  var master=actx.createGain(); master.gain.value=0.62; master.connect(actx.destination);
  parts.forEach(function(p,i){
    [0,0.9].forEach(function(det){
      var o=actx.createOscillator(); o.type='sine'; o.frequency.value=p.f+det;
      var g=actx.createGain(); g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(p.g*0.5,now+0.09);
      g.gain.exponentialRampToValueAtTime(0.0001,now+p.d+i*0.3);
      o.connect(g); g.connect(master); o.start(now); o.stop(now+p.d+i*0.3+0.1);
    });
  });
}

// ═══ BGM: pre-rendered binaural track (RETUNE_BGM_v03 — Binaural 0.925Hz) ═══
// bgm.wav = L 180Hz / R 180.925Hz → a 0.925Hz binaural beat. Played through a plain stereo
// <audio> element so the L/R channels are preserved exactly (no mono downmix — binaural needs
// both ears + headphones). The track is exactly 180s = the session length, so it plays once.
var bgmAudio=null, bgmFade=null;
var BGM_LEVEL=0.75;                  // gentle but audible — tune to taste
function startBGM(){
  if(bgmAudio) return;
  try{
    bgmAudio=new Audio('bgm.m4a?v=1'); bgmAudio.loop=false; bgmAudio.preload='auto'; bgmAudio.volume=0;
    bgmAudio.play().catch(function(){});
    var t0=performance.now();
    if(bgmFade) clearInterval(bgmFade);
    bgmFade=setInterval(function(){ if(!bgmAudio){ clearInterval(bgmFade); bgmFade=null; return; }
      var k=Math.min(1,(performance.now()-t0)/6000); bgmAudio.volume=BGM_LEVEL*k;     // fade in over 6s
      if(k>=1){ clearInterval(bgmFade); bgmFade=null; } },50);
  }catch(e){}
}
function stopBGM(){
  if(!bgmAudio) return;
  var a=bgmAudio; bgmAudio=null;
  if(bgmFade){ clearInterval(bgmFade); bgmFade=null; }
  var v0=a.volume, t0=performance.now();
  var iv=setInterval(function(){ var k=Math.min(1,(performance.now()-t0)/4000);       // fade out over 4s
    a.volume=Math.max(0,v0*(1-k)); if(k>=1){ clearInterval(iv); try{ a.pause(); a.currentTime=0; }catch(e){} } },50);
}

        _mistFrom.y=Math.max(TARGET.y-0.2,Math.min(TARGET.y+1.2,_mistFrom.y)); }
      var mp5=eio(c01((e-159)/14));                     // drift home over ~14s
      mistPivotG.visible=true;
      try{ mistPivotG.position.lerpVectors(_mistFrom,bodyPivotG?bodyPivotG.position:TARGET,mp5); }catch(e2){}
      try{ mistPivotG.scale.setScalar(0.82-0.06*mp5); }catch(e2){}   // clearly smaller than the body (user 2026-07-04) — slips INSIDE as it merges
      var mo=c01((e-159)/3)*(1-eio(c01((e-173)/5)));    // breathe in → dissolve as it merges
      for(var mi=0;mi<mistMats.length;mi++) mistMats[mi].m.opacity=mo*mistMats[mi].k;
      bGlowMat.opacity=0.16*eio(c01((e-169)/8));        // the body softly glows as it absorbs
    } else {
      mistPivotG.visible=false;
      if(e>=179) bGlowMat.opacity=Math.max(0,0.16*(1-(e-179)/8));  // afterglow settles away
      if(e<159) _mistArmed=false;                       // re-arm for replay
    }
  }
  applyViewpointCamera(e);
  // thread appears as the viewpoint lifts off (~1:06) and stays through the RETURN — in the
  // user's concept sketch the thread and the mist-you coexist while it comes home. It dissolves
  // together with the merge (~2:51–2:57), just before the landing glow.
  rubMat.opacity = THREAD_OPACITY * c01((e-66)/4) * c01((177-e)/6);
  if(rubMat.opacity>0.004) updateThread(e,dt);
}

// ── state ──
var elapsed=0,playing=false,paused=false,lastT=null,fT=0,started=false,ended=false;

var narDiv=document.getElementById('nar'),narTxt=document.getElementById('nt');
var lastLine=null,fadeTO=null;
function showLine(l){
  if(l===lastLine)return; lastLine=l;
  if(fadeTO)clearTimeout(fadeTO);
  if(!l){ narDiv.style.opacity='0'; return; }
  narDiv.style.opacity='0';
  fadeTO=setTimeout(function(){
    var html=lineText(l).replace(/\n/g,'<br>');
    // 2文以上は必ず文末で改行（user 2026-07-04）。「。」は表示しない方針（user 2026-07-05）——
    // 台本側で「。」は削除/改行済みなので、ここでは残った「。」を保険で消し、！？のみ改行する。
    html=html.replace(/。(?!<br>|$)/g,'<br>').replace(/。/g,'');
    html=html.replace(/([！？])(?!<br>|$)/g,'$1<br>');
    if(l.q) html='<span class="q">'+html+'</span>';
    narTxt.innerHTML=html; narDiv.style.opacity='1'; playLine(l);
  },450);
}
// ── ANONYMOUS USAGE ANALYTICS (2026-07-04, user-approved minimal-risk plan) ──
// Collects ONLY anonymous usage events: session start / scene reached / complete or exit
// (with the second mark) / whether journaling was chosen & saved. NO journal content,
// NO audio, NO personal data — matches the updated Terms §5. Endpoint = a Google Apps
// Script web app writing to the owner's spreadsheet. Empty URL = tracking fully off.
var ANALYTICS_URL='https://script.google.com/macros/s/AKfycbx0-kMKCHe92xhjrfHfibJg0hDeeXo3z89FzmBh1DyIt1RElz1s2K58-HvAHe67dzpL6A/exec';  // GAS→オーナーのスプレッドシート（2026-07-04設定・匿名利用ログのみ）
var APP_V='v5.7';
function anonId(){ try{ var k=localStorage.getItem('retune_anon_id');
  if(!k){ k='a'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); localStorage.setItem('retune_anon_id',k); }
  return k; }catch(e){ return 'anon'; } }
function track(ev,extra){
  if(!ANALYTICS_URL) return;
  try{
    var p=JSON.stringify({id:anonId(),v:APP_V,lang:LANG,ev:ev,t:Math.round(elapsed||0),extra:extra||'',ts:Date.now()});
    // text/plain + sendBeacon → no CORS preflight, survives page unload (exit events included)
    if(navigator.sendBeacon){ navigator.sendBeacon(ANALYTICS_URL,new Blob([p],{type:'text/plain'})); }
    else{ fetch(ANALYTICS_URL,{method:'POST',mode:'no-cors',keepalive:true,headers:{'Content-Type':'text/plain'},body:p}); }
  }catch(e){}
}
window.addEventListener('pagehide',function(){ if(started&&!ended) track('exit_page'); });

// A line's trigger time may be a number, or a per-language map {ja:.., en:..}.
// (Needed because the same line's audio has a different length per language, so the
//  gap to the NEXT line must be tuned separately to keep the intended silence — e.g.
//  the 1.5s pause after s01a2 "…あなた自身です".)
function atOf(l){ var a=l.at; return (a&&typeof a==='object')?(a[LANG]!=null?a[LANG]:a.ja):a; }
var lastSceneIdx=-1;
function updateHUD(e){
  document.getElementById('pf').style.width=(e/TOTAL*100)+'%';
  var m=Math.floor(e/60),s=Math.floor(e%60).toString().padStart(2,'0');
  document.getElementById('tl').textContent=m+':'+s;
  var cur=null;
  for(var i=0;i<SCENES.length;i++){ var sc=SCENES[i];
    if(e>=sc.s&&e<sc.e){ document.getElementById('sl').textContent=sc.label[LANG]||sc.label.ja;
      if(i!==lastSceneIdx){ lastSceneIdx=i; track('scene','s0'+(i+1)); }
      for(var j=0;j<sc.lines.length;j++) if(e>=atOf(sc.lines[j])) cur=sc.lines[j]; break; } }
  showLine(cur);
}

// ── MAIN LOOP ──
function animate(now){ requestAnimationFrame(animate); try{ animateFrame(now); }catch(e){} }
function animateFrame(now){
  var dt=lastT?Math.min((now-lastT)/1000,0.05):0;
  if(playing&&!paused&&lastT){ elapsed=Math.min(elapsed+dt,TOTAL); if(elapsed>=TOTAL) finishExperience(); }
  lastT=now; var e=elapsed; fT+=dt;
  // Sitting-Idle sway: slowed to 40% from start through the breathing block (user 2026-07-04 —
  // the figure should barely stir while the viewer settles into the 3 slow breaths)
  if(mixerBody) mixerBody.update(dt * (started && elapsed<66 ? 0.4 : 1));
  if(mixerDouble) mixerDouble.update(dt);
  if(SHOW_TRANSPARENT_BODY && started && mixerDouble && elapsed>=64 && elapsed<178){   // vary the double's motion while it's active
    // flying mixes in whenever the double surges across a far↔near transition; drifting clips while it hovers
    if((!doubleAction || doubleFlightWant!==curDoubleFly) && elapsed>=doubleSwitchAt){
      switchDoubleClip(doubleFlightWant?'flying':null);
      curDoubleFly=doubleFlightWant; doubleSwitchAt=elapsed+1.3+Math.random()*0.6;
      if(!doubleFlightWant) doubleFloatReroll=elapsed+5+Math.random()*4;
    } else if(!curDoubleFly && elapsed>=doubleFloatReroll){   // re-roll a fresh drift clip now and then
      switchDoubleClip(null); doubleFloatReroll=elapsed+5+Math.random()*4;
    }
  }
  if(started) updateHUD(e);

  if(!started){ lookFrom(sph(0.4,0.28,5.4)); }
  if(!modelReady){ renderer.render(scene3,cam); return; }
  bp3Mat.opacity=0;
  if(started && e>=66 && bRunning) showBreath(false); // breathing guide only in S1 (ends 1:06)

  if(!started){
    setTransOp(0); rubMat.opacity=0;
  } else if(!SHOW_TRANSPARENT_BODY){                 // ===== NEW DEFAULT: the camera IS the viewpoint =====
    applyViewpointFrame(e,dt);
  } else if(e<66){                                   // S1 — (old human-double choreography; runs only if SHOW_TRANSPARENT_BODY) seated full body + breathing-ring guide
    setTransOp(0); rubMat.opacity=0; bGlowMat.opacity=0;
    try{ trans.position.copy(TARGET); trans.rotation.set(0,0,0); }catch(e2){}
    try{ cam.position.set(0,bodyCenterY,bodyFitDist); cam.up.set(0,1,0); cam.lookAt(0,bodyCenterY,0); }catch(e2){}
    neckMat.emissiveIntensity=0.6; glowMat.opacity=0.03;
    ndot.visible=true; nglow.visible=true;            // restore the portal mark (in case of replay)
    if(!bRunning) showBreath(true);
    updateRubber();
  } else if(e<81){                                   // S2 the double appears; thoughts & feelings shift into it
    var p=sp(e,SCENES[1]),pp=pop(p);
    setTransOp(c01(p*4)*0.5); rubMat.opacity=c01(p*4)*0.55;
    var tgt0=sph(WP[0].az,WP[0].el,WP[0].r);
    var from=neckO.clone();
    try{ trans.position.set(lp(from.x,tgt0.x,pp), lp(from.y,tgt0.y,pp), lp(from.z,tgt0.z,pp)); }catch(e2){}
    lookAtFace(trans,dt);
    var pulse=p<0.25?p/0.25:Math.max(0,1-(p-0.25)/0.4);
    neckMat.emissiveIntensity=0.9+pulse*1.1; glowMat.opacity=0.1+pulse*0.2;
    lookAtFace(trans,dt);
    lookFrom(sph(0.55+fT*0.05,0.22,5.3));            // wider 3rd-person so the pop is readable
    if(p<0.05) resetDouble();
    updateRubber();
  } else if(e<107){                                  // S3 drift — clear 3rd-person: body centered, double floats nearby
    setTransOp(0.5); rubMat.opacity=0.5;
    try{ trans.position.copy(doubleStep(dt,0.6)); }catch(e2){}   // stay nearer during the first drift
    lookAtFace(trans,dt);
    lookFrom(sph(0.4+fT*0.12, 0.18+Math.sin(fT*0.25)*0.22, 5.8));
    neckMat.emissiveIntensity=0.7+Math.sin(fT)*0.15;
    updateRubber();
  } else if(e<159){                                  // S4 behold — 3rd-person orbit, varied angle & distance
    setTransOp(0.46); rubMat.opacity=0.46;
    var radScale=0.96+Math.sin(fT*0.22)*0.12;   // mild breathing; the near/far swing lives in the waypoints now
    try{ trans.position.copy(doubleStep(dt,radScale)); }catch(e2){}
    lookAtFace(trans,dt);
    // frame BOTH the seated body and the (often far) double, pulling back as they spread apart —
    // so the double genuinely reads as small & distant instead of drifting off-screen
    _mid4.copy(TARGET).multiplyScalar(0.62).addScaledVector(trans.position,0.38); // bias to the body (anchor)
    var spread4=TARGET.distanceTo(trans.position);
    var az4=fT*0.16, el4=Math.sin(fT*0.13)*0.45+0.16;
    var camD4=4.0+spread4*0.62;
    _off4.set(Math.cos(el4)*Math.sin(az4),Math.sin(el4),Math.cos(el4)*Math.cos(az4)).multiplyScalar(camD4);
    cam.position.copy(_mid4).add(_off4); cam.up.set(0,1,0); cam.lookAt(_mid4);
    neckMat.emissiveIntensity=0.65+Math.sin(fT*0.9)*0.12;
    updateRubber();
  } else if(e<177){                                  // S5 return to neck — 3rd-person, settling front
    var p5=sp(e,SCENES[4]),ep=eio(p5);
    setTransOp(lp(0.46,0.12,ep)); rubMat.opacity=lp(0.46,0.2,ep);
    try{ trans.position.lerp(neckO,Math.min(dt*1.6,ep*0.12+0.02)); }catch(e2){}
    lookAtFace(trans,dt);
    lookFrom(sph(0.4+(1-ep)*fT*0.08, lp(0.22,0.12,ep), lp(5.6,5.0,ep)));
    neckMat.emissiveIntensity=0.7+ep*0.6;
    updateRubber();
  } else {                                           // S6 land — glow, settle
    var p6=sp(e,SCENES[5]),ep6=eio(p6);
    // the whole neck "portal" — double + cord + glowing dot + halo-glow — dissolves as it lands,
    // leaving only the soft body halo. Fade ~2.4× faster than the scene so it's all gone by ~t173.
    var portal=1-Math.min(1,ep6*2.4);
    setTransOp(0.12*portal);                  // double merges back in (no lingering ghost)
    rubMat.opacity=0.2*portal; if(rubMat.opacity<0.03) rubMat.opacity=0;
    glowMat.opacity=0.2*portal;
    neckMat.emissiveIntensity=0.6*portal;
    ndot.visible=portal>0.02; nglow.visible=portal>0.02;     // hide the white mark once the portal closes
    bGlowMat.opacity=ep6*0.22;
    try{ trans.position.lerp(neckO,0.1); }catch(e2){}
    lookFrom(sph(0.4+ep6*0.3,0.18,lp(4.4,5.4,ep6)));
    if(rubMat.opacity>0) updateRubber();
  }
  // gaze lock runs last, after the float clip + body orientation are applied, so the eyes always win
  if(SHOW_TRANSPARENT_BODY && started && e>=30 && e<177) applyHeadGaze();
  // don't just rely on opacity:0 — some mobile GPUs still draw a transparent line as a hairline.
  // Skip drawing the cord entirely when it's effectively invisible.
  rubLine.visible = rubMat.opacity > 0.004;

  for(var i2=0;i2<PC;i2++){ pA[i2*3+1]+=pV[i2]; if(pA[i2*3+1]>TARGET.y+9)pA[i2*3+1]=TARGET.y-7; }
  pGeo.attributes.position.needsUpdate=true;
  renderer.render(scene3,cam);
}

  // Bell timing (user 2026-07-04): ring a beat LATER — let the screen settle first,

  setTimeout(ringBell,900);

function beginPlay(){

  lastSceneIdx=-1; track('session_start');

// ── JOURNALING (2026-07-04, user) ────────────────
// After the session: observe what the body-self was thinking / feeling, and how the
// translucent you felt watching it. Voice→text via Web Speech API (falls back to typing).
// Entries live ONLY in localStorage (matches the legal text: nothing leaves the device).
var SR=window.SpeechRecognition||window.webkitSpeechRecognition, SR_OK=!!SR;
var srCur=null, srBtn=null;
function srStop(){ try{ if(srCur) srCur.stop(); }catch(e){} srCur=null; if(srBtn){srBtn.classList.remove('rec');srBtn=null;} }
function srToggle(btn,ta){
  if(srBtn===btn){ srStop(); return; }
  srStop();
  if(!SR_OK) return;
  try{
    var r=new SR(); r.lang=(LANG==='ja'?'ja-JP':'en-US'); r.continuous=true; r.interimResults=false;
    r.onresult=function(ev){ for(var i=ev.resultIndex;i<ev.results.length;i++){ if(ev.results[i].isFinal){
      ta.value=(ta.value?ta.value+' ':'')+ev.results[i][0].transcript.trim(); } } };
    r.onend=function(){ if(srCur===r){ srCur=null; if(srBtn){srBtn.classList.remove('rec');srBtn=null;} } };
    r.onerror=function(){ srStop(); };
    r.start(); srCur=r; srBtn=btn; btn.classList.add('rec');
  }catch(e){ srStop(); }
}
[['jm1','jt1'],['jm2','jt2'],['jm3','jt3']].forEach(function(p){
  var b=document.getElementById(p[0]), t=document.getElementById(p[1]);
  if(!SR_OK){ b.style.display='none'; return; }
  b.addEventListener('click',function(){ srToggle(b,t); });
});
function jShow(id){ ['end','journal','journalLog','title'].forEach(function(s){
  var el=document.getElementById(s); el.classList.toggle('hidden',s!==id);
  if(s==='title'&&s===id) el.classList.remove('fade-out'); }); srStop(); }
function jLoad(){ try{ return JSON.parse(localStorage.getItem('retune_journal')||'[]'); }catch(e){ return []; } }
function jRenderLog(){
  var u=UI[LANG], list=jLoad(), el=document.getElementById('jList');
  if(!list.length){ el.innerHTML='<div class="jent"><div class="jrow2">'+u.jEmpty+'</div></div>'; return; }
  el.innerHTML=list.slice().reverse().map(function(en){
    var d=new Date(en.d), ds=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)
      +' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
    function esc(s){ return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
    var rows='';
    [['1',en.q1],['2',en.q2],['3',en.q3]].forEach(function(q){ if(q[1]) rows+='<div class="jrow2"><span class="jk">Q'+q[0]+'</span> '+esc(q[1])+'</div>'; });
    return '<div class="jent"><div class="jdate">'+ds+'</div>'+rows+'</div>';
  }).join('');
}

// Register the service worker so RETUNE installs as a home-screen app and runs offline.
if('serviceWorker' in navigator){
  // Was this page already controlled by a SW when it loaded? If so, a later
  // controllerchange means an UPDATE just took over — reload once so the new text/
  // audio/animation appear without the user manually reloading twice. First-ever
  // visit (no prior controller) is skipped so we don't reload on the initial install.
  var _hadSW = !!navigator.serviceWorker.controller;
  var _swReloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(_swReloaded || !_hadSW) return;
    _swReloaded = true;
    window.location.reload();
  });
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
