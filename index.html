<!DOCTYPE html>
<html lang="ja">
<head>

<title>RETUNE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#050510;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Hiragino Sans','Helvetica Neue',sans-serif;overflow:hidden;color:#e8e8ff}
#wrap{position:relative;width:100vw;height:100vh;max-width:440px;max-height:900px}
canvas{display:block;width:100%!important;height:100%!important;position:absolute;top:0;left:0}
#c3d{z-index:1}
#c2d{z-index:2;opacity:0;transition:opacity 1s}

/* overlays */
.screen{position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(120% 90% at 50% 35%,#10102a 0%,#070712 60%,#050510 100%);text-align:center;padding:32px 26px}
.hidden{display:none!important}
.fade-out{animation:fo 1s forwards}
@keyframes fo{to{opacity:0;visibility:hidden}}

/* title */
#title h1{font-size:34px;letter-spacing:0.42em;font-weight:200;color:#cfcff5;opacity:0;text-indent:0.42em;
  text-shadow:0 0 30px rgba(120,120,220,0.35);animation:ti 3.2s ease forwards}
@keyframes ti{0%{opacity:0;letter-spacing:0.7em}100%{opacity:1;letter-spacing:0.42em}}
#title .hint{margin-top:40px;font-size:12px;letter-spacing:0.25em;color:#6a6a90;opacity:0;animation:hb 2.4s ease 2.6s infinite}
@keyframes hb{0%,100%{opacity:0.25}50%{opacity:0.7}}
#title .langs{position:absolute;top:26px;right:22px;display:flex;gap:8px}
.lang-btn{font-size:11px;letter-spacing:0.15em;color:#7a7aa0;border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:5px 12px;background:transparent;cursor:pointer}
.lang-btn.on{color:#dcdcff;border-color:rgba(170,170,255,0.5);background:rgba(120,120,220,0.12)}

/* legal */
#legal{justify-content:flex-start;padding-top:46px}
#legal h2{font-size:15px;letter-spacing:0.18em;color:#bfbfe8;font-weight:400;margin-bottom:14px}
#ldoc{width:100%;max-width:380px;height:46vh;overflow-y:auto;text-align:left;font-size:12.5px;line-height:1.95;color:#b8b8d4;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 16px;-webkit-overflow-scrolling:touch}
#ldoc h3{font-size:13px;color:#dadaf5;margin:14px 0 4px;letter-spacing:0.06em}
#ldoc h3:first-child{margin-top:0}
#ldoc .warn{color:#ffd9b0;font-weight:600}
#ldoc .end{margin-top:16px;text-align:center;color:#55557a;font-size:11px;letter-spacing:0.2em}
#safety{max-width:380px;margin-top:16px;font-size:12.5px;line-height:1.7;color:#ffcfa6;
  border:1px solid rgba(255,180,120,0.28);border-radius:12px;padding:12px 14px;background:rgba(255,150,80,0.06)}
.consent{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:13px;color:#c8c8e4;cursor:pointer;max-width:380px}
.consent input{width:20px;height:20px;accent-color:#8a8ad8;flex:0 0 auto}
.consent.disabled{opacity:0.4;pointer-events:none}
#scrollnote{margin-top:8px;font-size:11px;color:#6a6a90;letter-spacing:0.12em}
.primary{margin-top:18px;font-size:14px;letter-spacing:0.22em;color:#0c0c18;background:linear-gradient(90deg,#9a9ae0,#b9b9f0);

.primary:disabled{opacity:0.3;cursor:default}

#loading{position:absolute;inset:0;z-index:55;display:none;flex-direction:column;align-items:center;justify-content:center;background:#050510}
#lt{font-size:13px;color:#5a5a80;letter-spacing:0.2em}

<h3>2. 医療・効果に関する免責</h3>本アプリは医療行為・診断・治療ではありません。病気の治療や予防を目的とするものではなく、医師その他の専門家による助言の代替にはなりません。心身に不調・疾患のある方、通院中・服薬中の方、妊娠中の方は、ご利用前に専門家にご相談ください。
<h3>3. <span class="warn">安全に関する重要な注意</span></h3><span class="warn">運転中・自転車や乗り物の操作中・歩行中・機械や火気の取り扱い中・その他注意を要するいかなる状況でも、絶対に本アプリを使用しないでください。</span>本アプリは意識を内側に向け、視覚イメージに集中するため、周囲への注意が著しく低下します。必ず安全で、座るか横になれる落ち着いた場所で行ってください。気分が悪くなった場合は、すぐに中止してください。
<h3>4. 光・音について</h3>画面には光の演出が、音声にはナレーションや鐘の音が含まれます。光や音に過敏な方、てんかんの既往がある方はご注意ください。音量は事前に適切な大きさに調整してください。
<h3>5. プライバシー</h3>本アプリは、体験のための個人情報を収集・送信しません。設定はお使いの端末内にのみ保存されます。
<h3>6. 自己責任</h3>本アプリのご利用は、利用者ご自身の判断と責任において行うものとします。提供者は、利用に起因して生じたいかなる損害についても責任を負いません。
<div class="end">— 以上 —</div>`,
  en:`<h3>1. About this app</h3>RETUNE is a self-care / relaxation experience that uses deep breathing and imagery (a shift of perspective) to calm the mind and body and change your state of awareness.
<h3>2. Medical disclaimer</h3>This app is not medical care, diagnosis, or treatment. It is not intended to treat or prevent any condition and is not a substitute for professional advice. If you have any physical or mental health condition, are under medical care or medication, or are pregnant, consult a professional before use.
<h3>3. <span class="warn">Important safety notice</span></h3><span class="warn">Never use this app while driving, operating any vehicle or machinery, walking, handling fire, or in any situation that requires your attention.</span> The experience turns your awareness inward and reduces attention to your surroundings. Use only in a safe, calm place where you can sit or lie down. Stop immediately if you feel unwell.
<h3>4. Light & sound</h3>The screen contains light effects; the audio contains narration and bell sounds. Take care if you are sensitive to light or sound, or have a history of epilepsy. Set the volume to a comfortable level beforehand.

<h3>6. Your responsibility</h3>Use of this app is at your own discretion and risk. The provider is not liable for any damages arising from its use.

// ── scenes & narration (id = future audio file name) ──
var SCENES=[
 {s:0,e:55,label:{ja:'Scene 01 — 深呼吸',en:'Scene 01 — Breathe'},lines:[
   {at:1,id:'s01a',ja:'楽な姿勢で大丈夫です。座っていても、横になっていても構いません。',en:'Settle into a comfortable position. Sitting or lying down — either is fine.'},
   {at:4.5,id:'s01b',ja:'それでは、ゆっくりと、深呼吸。鼻から、すって……',en:'Now, a slow, deep breath. In through your nose…'},

 ]},
 {s:55,e:70,label:{ja:'Scene 02 — 移る',en:'Scene 02 — Shift'},lines:[
   {at:56,id:'s02a',ja:'いま、あなたの首元から、すこし離れたところに——半透明の、もうひとつのあなたが、静かに、あらわれます。',en:'Now, a little away from the base of your neck — a translucent other you quietly appears.'},
   {at:64,id:'s02b',ja:'思考も、感情も、そのもうひとりのあなたへ、ゆっくりと、移っていきます。',en:'Your thoughts and feelings slowly move into that other you.'}

 {s:70,e:88,label:{ja:'Scene 03 — 離れる',en:'Scene 03 — Drift'},lines:[

   {at:82,id:'s03b',ja:'見る位置が、自由になります。上も、下も、ありません。あなたは、自分の意志で、どこへでも動けます。',en:'Your point of view becomes free. There is no up, no down. By your own will, you can move anywhere.'}

function lineText(l){return l[LANG]||l.ja;}

// ═══ AUDIO: bell (WebAudio singing bowl) + unlock ═══
var actx=null;
function unlockAudio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
function ringBell(){
  try{
    if(AUDIO_BASE){ var b=new Audio(AUDIO_BASE+'/bell.mp3'); b.play().catch(function(){synthBell();}); return; }
    synthBell();
  }catch(e){ try{synthBell();}catch(_){} }
}
function synthBell(){
  if(!actx) return;
  var now=actx.currentTime;
  // inharmonic partials for a bowl-like timbre
  var parts=[{f:220,g:0.5},{f:330,g:0.32},{f:543,g:0.2},{f:880,g:0.12},{f:1210,g:0.06}];
  var master=actx.createGain(); master.gain.value=0.9; master.connect(actx.destination);
  parts.forEach(function(p,i){
    var o=actx.createOscillator(); o.type='sine'; o.frequency.value=p.f*(1+(i?0.002*i:0));
    var g=actx.createGain(); g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(p.g,now+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,now+4.5+i*0.4);
    o.connect(g); g.connect(master); o.start(now); o.stop(now+5.2+i*0.4);
  });
}

// ═══ BGM: pre-rendered binaural track (RETUNE_BGM_v03 — Binaural 0.925Hz) ═══
// bgm.wav = L 180Hz / R 180.925Hz → a 0.925Hz binaural beat. Played through a plain stereo
// <audio> element so the L/R channels are preserved exactly (no mono downmix — binaural needs
// both ears + headphones). The track is exactly 180s = the session length, so it plays once.
var bgmAudio=null, bgmFade=null;
var BGM_LEVEL=0.75;                  // gentle but audible — tune to taste
function startBGM(){
  if(bgmAudio) return;
  try{
    bgmAudio=new Audio('bgm.m4a?v=1'); bgmAudio.loop=false; bgmAudio.preload='auto'; bgmAudio.volume=0;
    bgmAudio.play().catch(function(){});
    var t0=performance.now();
    if(bgmFade) clearInterval(bgmFade);
    bgmFade=setInterval(function(){ if(!bgmAudio){ clearInterval(bgmFade); bgmFade=null; return; }
      var k=Math.min(1,(performance.now()-t0)/6000); bgmAudio.volume=BGM_LEVEL*k;     // fade in over 6s
      if(k>=1){ clearInterval(bgmFade); bgmFade=null; } },50);
  }catch(e){}
}
function stopBGM(){
  if(!bgmAudio) return;
  var a=bgmAudio; bgmAudio=null;
  if(bgmFade){ clearInterval(bgmFade); bgmFade=null; }
  var v0=a.volume, t0=performance.now();
  var iv=setInterval(function(){ var k=Math.min(1,(performance.now()-t0)/4000);       // fade out over 4s
    a.volume=Math.max(0,v0*(1-k)); if(k>=1){ clearInterval(iv); try{ a.pause(); a.currentTime=0; }catch(e){} } },50);
}

// ═══ NARRATION (audio file first, Web Speech fallback) ═══
var curAudio=null;
function stopNarration(){ try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){} try{ if(curAudio){curAudio.pause();curAudio=null;} }catch(e){} }
var NARRATION_VOICE=false;   // false = subtitles only (no spoken voice). Set true to re-enable narration audio.
function playLine(l){
  stopNarration();
  if(!NARRATION_VOICE) return;            // voice off — on-screen text (subtitles) still shows
  var txt=lineText(l);
  if(AUDIO_BASE && l.id){
    try{
      var a=new Audio(AUDIO_BASE+'/'+LANG+'/'+l.id+'.mp3'); curAudio=a;
      a.addEventListener('error',function(){ speak(txt); });
      a.play().catch(function(){ speak(txt); });
      return;
    }catch(e){}
  }
  speak(txt);
}
function pickVoice(){
  if(!window.speechSynthesis) return null;
  var v=speechSynthesis.getVoices(),pref=LANG==='ja'
    ? ['Kyoko','O-ren','Google 日本語','Microsoft Nanami','Microsoft Ayumi']
    : ['Samantha','Google US English','Microsoft Aria','Microsoft Jenny','Daniel'];
  for(var i=0;i<pref.length;i++) for(var j=0;j<v.length;j++) if(v[j].name.indexOf(pref[i])!==-1) return v[j];
  var code=LANG==='ja'?'ja':'en';
  for(var k=0;k<v.length;k++) if((v[k].lang||'').toLowerCase().indexOf(code)===0) return v[k];
  return null;
}
function speak(t){
  if(!window.speechSynthesis) return;
  try{ speechSynthesis.cancel(); }catch(e){}
  var u=new SpeechSynthesisUtterance(t.replace(/\n/g,' ').replace(/——/g,'、'));
  u.lang=LANG==='ja'?'ja-JP':'en-US';
  u.rate=0.9; u.pitch=1.0; u.volume=1.0;        // neutral, calm; not high-pitched
  var v=pickVoice(); if(v) u.voice=v;
  try{ speechSynthesis.speak(u); }catch(e){}
}

// Cycle: inhale 6s → hold 3s → exhale 8s = 17s per breath, 3 breaths in S1 (user spec 2026-07-04).

  var t=bTime%CYC, prog, label, sub='', key;
  if(t<IN){ key='in'; prog=bEase(t/IN); label=LANG==='ja'?'すって':'breathe in'; }
  else if(t<IN+HOLD){ key='hold'; prog=1; label=LANG==='ja'?'とめて':'hold'; sub=LANG==='ja'?HOLD+'秒':HOLD+' sec'; }
  else { key='out'; prog=1-bEase((t-IN-HOLD)/OUT); label=LANG==='ja'?'はいて':'breathe out'; }

// sphere point relative to body
function sph(az,el,r){ return new THREE.Vector3(r*Math.cos(el)*Math.sin(az),TARGET.y+r*Math.sin(el),r*Math.cos(el)*Math.cos(az)); }

// camera looks at body from a position; up flips when overhead
function lookFrom(pos){ try{cam.position.copy(pos);}catch(e){}
  var over=(pos.y-TARGET.y); cam.up.set(0, Math.abs(over)>0 ? (pos.y>=TARGET.y-0.001?1:1):1, 0);
  cam.up.set(0,1,0); cam.lookAt(TARGET); }

// double purposeful motion: eased waypoints in the sphere
// alternating NEAR (~2) and FAR (~6-7) waypoints → every leg is a deliberate near↔far surge,
// so the double sometimes hangs close, sometimes shrinks far away (遠くに小さい姿), and the
// fast legs trip the flight clip. el varied so it also orbits up/down.
var WP=[ {az:0.6,el:0.30,r:2.0},{az:2.1,el:0.80,r:6.4},{az:3.4,el:-0.20,r:2.2},
  {az:4.6,el:0.55,r:7.0},{az:5.9,el:-0.55,r:2.3},{az:7.3,el:0.95,r:5.9},
  {az:8.6,el:-0.35,r:2.0},{az:9.9,el:0.45,r:6.7} ];
var wpI=0,wpHold=0,wpMoving=true,wpPos=new THREE.Vector3(),wpVel=new THREE.Vector3();
var _mid4=new THREE.Vector3(),_off4=new THREE.Vector3();   // S4 camera: frame body + double together
function resetDouble(){ wpI=0;wpMoving=true;wpHold=0; wpPos.copy(sph(WP[0].az,WP[0].el,WP[0].r)); wpVel.set(0,0,0); smY=null; }
function doubleStep(dt,radScale){
  var w=WP[wpI%WP.length];
  var tgt=sph(w.az,w.el,w.r*(radScale||1));
  if(wpMoving){
    // gentle, unhurried glide toward target, then linger — calm/natural rather than busy
    var k=Math.min(dt*1.8,0.09);
    wpVel.lerp(new THREE.Vector3().subVectors(tgt,wpPos).multiplyScalar(1.5),k);
    if(wpVel.length()>2.6) wpVel.setLength(2.6);   // cap speed → even far moves glide calmly, not dart
    wpPos.addScaledVector(wpVel,dt);
    if(wpPos.distanceTo(tgt)<0.2 && wpVel.length()<0.45){ wpMoving=false; wpHold=5.0+Math.random()*4.0; }
  } else { wpHold-=dt; if(wpHold<=0){ wpI++; wpMoving=true; } }
  // motion-driven flight state (hysteresis: fly when surging far↔near, drift when slow) → animate() swaps clip
  var spd=wpVel.length();
  if(spd>1.2) doubleFlightWant=true; else if(spd<0.5) doubleFlightWant=false;
  return wpPos;
}

// Double's gaze/posture: its eyes (+z front) always aim at the body's face (FACEPT).
// Pitch follows the face (so from above it tips forward, from below it reclines — a free,
// zero-G "astronaut" feel) plus a gentle sway. Limb bending needs a rig (see F25).
var smX=0,smZ=0,smY=null;
function lookAtFace(obj,dt){
  var dx=FACEPT.x-obj.position.x, dy=FACEPT.y-obj.position.y, dz=FACEPT.z-obj.position.z;
  var dH=Math.sqrt(dx*dx+dz*dz);
  if(dH<0.35) return;                       // right at the body — gaze undefined; keep current orientation
  var yaw=Math.atan2(dx,dz);
  var pitch=-Math.atan2(dy,dH);            // +z (eyes) tilts toward the face above/below
  var roll=Math.sin(fT*0.5)*0.04;          // slow floating sway
  if(smY===null) smY=yaw;
  var dyaw=yaw-smY; while(dyaw>Math.PI)dyaw-=2*Math.PI; while(dyaw<-Math.PI)dyaw+=2*Math.PI; // shortest path
  smY+=dyaw*Math.min(dt*1.8,0.05);         // ease the turn so it doesn't snap around (calmer)
  smX+=(pitch-smX)*Math.min(dt*2.5,0.07);
  smZ+=(roll-smZ)*Math.min(dt*2.5,0.08);
  try{ obj.rotation.set(smX, smY, smZ); }catch(e){}
}

// Lock the double's EYES onto the body's face every frame, AFTER the float clip has posed the head.
// The body may drift/tumble calmly, but the gaze never leaves the body (it is observing itself).
var _g1=new THREE.Vector3(),_g2=new THREE.Vector3(),_g3=new THREE.Vector3();
var _gq1=new THREE.Quaternion(),_gq2=new THREE.Quaternion(),_gq3=new THREE.Quaternion(),_gq4=new THREE.Quaternion();
function applyHeadGaze(){
  if(!doubleHeadBone||!headFaceLocal) return;
  doubleHeadBone.updateWorldMatrix(true,false);
  var hp=_g1.setFromMatrixPosition(doubleHeadBone.matrixWorld);
  var dir=_g2.copy(FACEPT).sub(hp); if(dir.lengthSq()<1e-5) return; dir.normalize();
  var qCur=doubleHeadBone.getWorldQuaternion(_gq1);
  var curFace=_g3.copy(headFaceLocal).applyQuaternion(qCur).normalize();   // where the eyes point now
  var qDelta=_gq2.setFromUnitVectors(curFace,dir);                          // shortest swing onto the face
  var qWorld=_gq3.multiplyQuaternions(qDelta,qCur);
  var qParent=doubleHeadBone.parent.getWorldQuaternion(_gq4);
  doubleHeadBone.quaternion.copy(qParent.invert().multiply(qWorld));        // back to local space
  doubleHeadBone.updateMatrixWorld(true);
}

// ── easing ──
function eio(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
function lp(a,b,t){return a+(b-a)*t;}
function c01(v){return Math.max(0,Math.min(1,v));}
function sp(e,s){return c01((e-s.s)/(s.e-s.s));}
// popcorn pop: fast overshoot then settle
function pop(p){ if(p<=0)return 0; if(p>=1)return 1; return 1-Math.pow(1-p,2.2)*Math.cos(p*Math.PI*1.1); }

// ════════════════════════════════════════════════════════════════════════════
//  VIEWPOINT MODE — the transparent body is the CAMERA, not a 3D model.
//  Only the seated physical body is shown; the camera move IS the out-of-body view.
//  (Restore the old human double by setting SHOW_TRANSPARENT_BODY=true at the top.)
// ════════════════════════════════════════════════════════════════════════════

// The elastic cord (2026-07-03): runs from the BACK of the body's neck to the VIEWER's
// ankle — i.e. to a point just below the bottom edge of the frame. The person watching
// the phone IS the transparent body, so the cord leaves the neck and comes "home" to us.
// It follows the camera with a soft lag (elastic, not rigid) plus a zero-g sway.
var THREAD_OPACITY=0.26, THREAD_SAG=0.40;
var _thA=new THREE.Vector3(), _thE=new THREE.Vector3(), _thET=new THREE.Vector3(), _thFwd=new THREE.Vector3(), _thDown=new THREE.Vector3(), _thInit=false;
function updateThread(e,dt){
  var ax,ay,az;
  if(bodyNeckBone){ bodyNeckBone.getWorldPosition(_thA); ax=_thA.x; ay=_thA.y; az=_thA.z-0.10; } // -z = behind the neck
  else { ax=neckO.x; ay=neckO.y; az=neckO.z; }
  // far end = viewer's ankle: below the frame's bottom edge, slightly ahead of the camera.
  // Use the camera's REAL orientation (quaternion) so "screen-down" stays the bottom of the
  // frame at any elevation/roll — overhead and under-views included.
  _thFwd.set(0,0,-1).applyQuaternion(cam.quaternion);
  _thDown.set(0,-1,0).applyQuaternion(cam.quaternion);
  _thET.copy(cam.position).addScaledVector(_thFwd,0.85).addScaledVector(_thDown,1.15);
  var swx=Math.sin(e*0.45)*0.06, swz=Math.cos(e*0.37)*0.05;          // gentle zero-g sway
  _thET.x+=swx; _thET.z+=swz;
  if(!_thInit){ _thE.copy(_thET); _thInit=true; }
  _thE.lerp(_thET, Math.min(1,(dt||0.016)*3.2));                     // elastic lag — follows, never snaps
  var ex=_thE.x, ey=_thE.y, ez=_thE.z;
  var mx=(ax+ex)/2+swx*2.0, my=(ay+ey)/2-THREAD_SAG, mz=(az+ez)/2+swz*2.0;  // sagging midpoint
  for(var i=0;i<30;i++){ var t=i/29,it=1-t;
    rubPts[i*3]  =it*it*ax+2*it*t*mx+t*t*ex;
    rubPts[i*3+1]=it*it*ay+2*it*t*my+t*t*ey;
    rubPts[i*3+2]=it*it*az+2*it*t*mz+t*t*ez; }
  rubGeo.attributes.position.needsUpdate=true;
}

// The camera path = the journey of the viewpoint. Each key:
//   t  = time (seconds)            az = azimuth (deg, horizontal angle around the body)
//   el = elevation (deg, height)   r  = distance        ty = look-height offset
//   roll = horizon tilt (deg) → up/down stops feeling fixed (天地が薄れる)
// All quiet, meditative, cinematic. Tune these numbers freely.
var CAM_KEYS=[
  {t:0,   az:0,   el:2,  r:5.2, ty:0.00, roll:0},   // 0:00  sit quietly, near eye-level in front (breath-ring aligns)
  {t:55,  az:5,   el:3,  r:5.1, ty:0.00, roll:0},   // 0:55  breathing (3×17s) — the faintest drift only
  {t:70,  az:46,  el:13, r:5.5, ty:0.08, roll:2},   // 1:10  the viewpoint lifts away from the neck
  {t:88,  az:112, el:21, r:5.8, ty:0.10, roll:5},   // 1:28  slow horizontal orbit — the side
  {t:103, az:180, el:-16,r:5.6, ty:0.06, roll:9},   // 1:43  from BELOW, looking up (仰視 — 絵コンテS4の下から視点)
  {t:118, az:250, el:14, r:6.0, ty:0.12, roll:12},  // 1:58  rising past the side-back
  {t:132, az:310, el:46, r:5.5, ty:0.10, roll:17},  // 2:12  high & behind, looking down
  {t:140, az:360, el:64, r:5.1, ty:0.06, roll:22},  // 2:20  diagonal-overhead, horizon tilted (天地が薄れる)
  {t:151, az:432, el:40, r:5.2, ty:0.04, roll:12},  // 2:31  begin the descent home
  {t:162, az:498, el:18, r:4.8, ty:0.00, roll:4},   // 2:42  lower, drawing closer
  {t:168, az:540, el:11, r:4.4, ty:-0.04,roll:0},   // 2:48  back of the neck — the connection point
  {t:180, az:540, el:9,  r:4.2, ty:-0.04,roll:0}    // 3:00  settle, still
];
var _vpPos=new THREE.Vector3(),_vpTgt=new THREE.Vector3(),_vpFwd=new THREE.Vector3(),_vpUp=new THREE.Vector3();
function applyViewpointCamera(e){
  var k0=CAM_KEYS[0],k1=CAM_KEYS[0];
  for(var i=0;i<CAM_KEYS.length-1;i++){ if(e>=CAM_KEYS[i].t && e<=CAM_KEYS[i+1].t){ k0=CAM_KEYS[i]; k1=CAM_KEYS[i+1]; break; } }
  if(e>=CAM_KEYS[CAM_KEYS.length-1].t){ k0=k1=CAM_KEYS[CAM_KEYS.length-1]; }
  var span=Math.max(0.001,k1.t-k0.t), u=c01((e-k0.t)/span), s=u*u*(3-2*u);  // smoothstep ease
  var az=lp(k0.az,k1.az,s)*Math.PI/180, el=lp(k0.el,k1.el,s)*Math.PI/180;
  var r=lp(k0.r,k1.r,s), ty=lp(k0.ty,k1.ty,s), roll=lp(k0.roll,k1.roll,s)*Math.PI/180;
  var cy=Math.cos(el);
  _vpPos.set(TARGET.x+r*cy*Math.sin(az), TARGET.y+ty+r*Math.sin(el), TARGET.z+r*cy*Math.cos(az));
  _vpTgt.set(TARGET.x, TARGET.y+ty*0.5, TARGET.z);
  cam.position.copy(_vpPos);
  _vpFwd.subVectors(_vpTgt,_vpPos).normalize();
  _vpUp.set(0,1,0).applyAxisAngle(_vpFwd, roll + Math.sin(e*0.05)*0.03);     // tilt + slow breath sway
  cam.up.copy(_vpUp);
  cam.lookAt(_vpTgt);
}

// One frame of the viewpoint experience: still seated body + viewpoint camera + neck thread.
function applyViewpointFrame(e,dt){
  setTransOp(0);                                            // keep the (unused) human double hidden
  ndot.visible=false; nglow.visible=false; bGlowMat.opacity=0; glowMat.opacity=0; neckMat.emissiveIntensity=0;
  if(e>=4&&e<55){ if(!bRunning) showBreath(true); }         // ring starts after the settle-in line; 3×17s breaths (4–55s)
  // Zero-g tumble (user 2026-07-04): across S4 the seated body makes ONE full head-over-heels
  // revolution (360° backward around X) — soles sweep into view mid-turn, and the body arrives
  // upright again exactly as S4 ends. The small twist/roll fade to zero at both ends, so the
  // motion begins from stillness and returns to stillness with nothing left to "undo" in S5.
  if(bodyPivotG){
    var tu=eio(c01((e-88)/62));                        // eased full revolution across S4 (88–150s)
    var spin=-Math.PI*2*tu;                            // 0 → -360°: backward, soles-first
    var organ=Math.sin(Math.PI*tu);                    // 0 at both ends — organic drift envelope
    var yaw=0.35*Math.sin(e*0.045)*organ;              // slow drifting twist
    try{ bodyPivotG.rotation.set(spin, yaw, 0.08*organ); }catch(e2){}
  }
  applyViewpointCamera(e);
  // thread appears as the viewpoint lifts off (~0:55) and fades as it returns into the body (~2:54)
  rubMat.opacity = THREAD_OPACITY * c01((e-55)/4) * c01((180-e)/6);
  if(rubMat.opacity>0.004) updateThread(e,dt);
}

// ── state ──
var elapsed=0,playing=false,paused=false,lastT=null,fT=0,started=false,ended=false;

var narDiv=document.getElementById('nar'),narTxt=document.getElementById('nt');
var lastLine=null,fadeTO=null;
function showLine(l){
  if(l===lastLine)return; lastLine=l;
  if(fadeTO)clearTimeout(fadeTO);
  if(!l){ narDiv.style.opacity='0'; return; }
  narDiv.style.opacity='0';
  fadeTO=setTimeout(function(){
    var html=lineText(l).replace(/\n/g,'<br>');
    if(l.q) html='<span class="q">'+html+'</span>';
    narTxt.innerHTML=html; narDiv.style.opacity='1'; playLine(l);
  },450);
}
function updateHUD(e){
  document.getElementById('pf').style.width=(e/TOTAL*100)+'%';
  var m=Math.floor(e/60),s=Math.floor(e%60).toString().padStart(2,'0');
  document.getElementById('tl').textContent=m+':'+s;
  var cur=null;
  for(var i=0;i<SCENES.length;i++){ var sc=SCENES[i];
    if(e>=sc.s&&e<sc.e){ document.getElementById('sl').textContent=sc.label[LANG]||sc.label.ja;
      for(var j=0;j<sc.lines.length;j++) if(e>=sc.lines[j].at) cur=sc.lines[j]; break; } }
  showLine(cur);
}

// ── MAIN LOOP ──
function animate(now){ requestAnimationFrame(animate); try{ animateFrame(now); }catch(e){} }
function animateFrame(now){
  var dt=lastT?Math.min((now-lastT)/1000,0.05):0;
  if(playing&&!paused&&lastT){ elapsed=Math.min(elapsed+dt,TOTAL); if(elapsed>=TOTAL) finishExperience(); }
  lastT=now; var e=elapsed; fT+=dt;
  // Sitting-Idle sway: slowed to 40% from start through the breathing block (user 2026-07-04 —
  // the figure should barely stir while the viewer settles into the 3 slow breaths)
  if(mixerBody) mixerBody.update(dt * (started && elapsed<55 ? 0.4 : 1));
  if(mixerDouble) mixerDouble.update(dt);
  if(SHOW_TRANSPARENT_BODY && started && mixerDouble && elapsed>=54 && elapsed<169){   // vary the double's motion while it's active
    // flying mixes in whenever the double surges across a far↔near transition; drifting clips while it hovers
    if((!doubleAction || doubleFlightWant!==curDoubleFly) && elapsed>=doubleSwitchAt){
      switchDoubleClip(doubleFlightWant?'flying':null);
      curDoubleFly=doubleFlightWant; doubleSwitchAt=elapsed+1.3+Math.random()*0.6;
      if(!doubleFlightWant) doubleFloatReroll=elapsed+5+Math.random()*4;
    } else if(!curDoubleFly && elapsed>=doubleFloatReroll){   // re-roll a fresh drift clip now and then
      switchDoubleClip(null); doubleFloatReroll=elapsed+5+Math.random()*4;
    }
  }
  if(started) updateHUD(e);

  if(!started){ lookFrom(sph(0.4,0.28,5.4)); }
  if(!modelReady){ renderer.render(scene3,cam); return; }
  bp3Mat.opacity=0;
  if(started && e>=55 && bRunning) showBreath(false); // breathing guide only in S1 (ends 0:55)

  if(!started){
    setTransOp(0); rubMat.opacity=0;
  } else if(!SHOW_TRANSPARENT_BODY){                 // ===== NEW DEFAULT: the camera IS the viewpoint =====
    applyViewpointFrame(e,dt);
  } else if(e<55){                                   // S1 — (old human-double choreography; runs only if SHOW_TRANSPARENT_BODY) seated full body + breathing-ring guide
    setTransOp(0); rubMat.opacity=0; bGlowMat.opacity=0;
    try{ trans.position.copy(TARGET); trans.rotation.set(0,0,0); }catch(e2){}
    try{ cam.position.set(0,bodyCenterY,bodyFitDist); cam.up.set(0,1,0); cam.lookAt(0,bodyCenterY,0); }catch(e2){}
    neckMat.emissiveIntensity=0.6; glowMat.opacity=0.03;
    ndot.visible=true; nglow.visible=true;            // restore the portal mark (in case of replay)
    if(!bRunning) showBreath(true);
    updateRubber();
  } else if(e<70){                                   // S2 the double appears; thoughts & feelings shift into it
    var p=sp(e,SCENES[1]),pp=pop(p);
    setTransOp(c01(p*4)*0.5); rubMat.opacity=c01(p*4)*0.55;
    var tgt0=sph(WP[0].az,WP[0].el,WP[0].r);
    var from=neckO.clone();
    try{ trans.position.set(lp(from.x,tgt0.x,pp), lp(from.y,tgt0.y,pp), lp(from.z,tgt0.z,pp)); }catch(e2){}
    lookAtFace(trans,dt);
    var pulse=p<0.25?p/0.25:Math.max(0,1-(p-0.25)/0.4);
    neckMat.emissiveIntensity=0.9+pulse*1.1; glowMat.opacity=0.1+pulse*0.2;
    lookAtFace(trans,dt);
    lookFrom(sph(0.55+fT*0.05,0.22,5.3));            // wider 3rd-person so the pop is readable
    if(p<0.05) resetDouble();
    updateRubber();
  } else if(e<88){                                   // S3 drift — clear 3rd-person: body centered, double floats nearby
    setTransOp(0.5); rubMat.opacity=0.5;
    try{ trans.position.copy(doubleStep(dt,0.6)); }catch(e2){}   // stay nearer during the first drift
    lookAtFace(trans,dt);
    lookFrom(sph(0.4+fT*0.12, 0.18+Math.sin(fT*0.25)*0.22, 5.8));
    neckMat.emissiveIntensity=0.7+Math.sin(fT)*0.15;
    updateRubber();
  } else if(e<150){                                  // S4 behold — 3rd-person orbit, varied angle & distance
    setTransOp(0.46); rubMat.opacity=0.46;
    var radScale=0.96+Math.sin(fT*0.22)*0.12;   // mild breathing; the near/far swing lives in the waypoints now
    try{ trans.position.copy(doubleStep(dt,radScale)); }catch(e2){}
    lookAtFace(trans,dt);
    // frame BOTH the seated body and the (often far) double, pulling back as they spread apart —
    // so the double genuinely reads as small & distant instead of drifting off-screen
    _mid4.copy(TARGET).multiplyScalar(0.62).addScaledVector(trans.position,0.38); // bias to the body (anchor)
    var spread4=TARGET.distanceTo(trans.position);
    var az4=fT*0.16, el4=Math.sin(fT*0.13)*0.45+0.16;
    var camD4=4.0+spread4*0.62;
    _off4.set(Math.cos(el4)*Math.sin(az4),Math.sin(el4),Math.cos(el4)*Math.cos(az4)).multiplyScalar(camD4);
    cam.position.copy(_mid4).add(_off4); cam.up.set(0,1,0); cam.lookAt(_mid4);
    neckMat.emissiveIntensity=0.65+Math.sin(fT*0.9)*0.12;
    updateRubber();
  } else if(e<168){                                  // S5 return to neck — 3rd-person, settling front
    var p5=sp(e,SCENES[4]),ep=eio(p5);
    setTransOp(lp(0.46,0.12,ep)); rubMat.opacity=lp(0.46,0.2,ep);
    try{ trans.position.lerp(neckO,Math.min(dt*1.6,ep*0.12+0.02)); }catch(e2){}
    lookAtFace(trans,dt);
    lookFrom(sph(0.4+(1-ep)*fT*0.08, lp(0.22,0.12,ep), lp(5.6,5.0,ep)));
    neckMat.emissiveIntensity=0.7+ep*0.6;
    updateRubber();
  } else {                                           // S6 land — glow, settle
    var p6=sp(e,SCENES[5]),ep6=eio(p6);
    // the whole neck "portal" — double + cord + glowing dot + halo-glow — dissolves as it lands,
    // leaving only the soft body halo. Fade ~2.4× faster than the scene so it's all gone by ~t173.
    var portal=1-Math.min(1,ep6*2.4);
    setTransOp(0.12*portal);                  // double merges back in (no lingering ghost)
    rubMat.opacity=0.2*portal; if(rubMat.opacity<0.03) rubMat.opacity=0;
    glowMat.opacity=0.2*portal;
    neckMat.emissiveIntensity=0.6*portal;
    ndot.visible=portal>0.02; nglow.visible=portal>0.02;     // hide the white mark once the portal closes
    bGlowMat.opacity=ep6*0.22;
    try{ trans.position.lerp(neckO,0.1); }catch(e2){}
    lookFrom(sph(0.4+ep6*0.3,0.18,lp(4.4,5.4,ep6)));
    if(rubMat.opacity>0) updateRubber();
  }
  // gaze lock runs last, after the float clip + body orientation are applied, so the eyes always win
  if(SHOW_TRANSPARENT_BODY && started && e>=30 && e<168) applyHeadGaze();
  // don't just rely on opacity:0 — some mobile GPUs still draw a transparent line as a hairline.
  // Skip drawing the cord entirely when it's effectively invisible.
  rubLine.visible = rubMat.opacity > 0.004;

  for(var i2=0;i2<PC;i2++){ pA[i2*3+1]+=pV[i2]; if(pA[i2*3+1]>TARGET.y+9)pA[i2*3+1]=TARGET.y-7; }
  pGeo.attributes.position.needsUpdate=true;
  renderer.render(scene3,cam);
}

});

var consented=false;
try{ consented=localStorage.getItem('retune_consent')==='1'; }catch(e){}
function openLegal(){
  var lg=document.getElementById('legal'); lg.classList.remove('hidden');
  if(consented){
    // returning user: skip full doc, show only per-session safety reminder
    document.getElementById('ldoc').classList.add('hidden');
    document.getElementById('scrollnote').classList.add('hidden');
    document.getElementById('consentRow').classList.add('hidden');
    document.getElementById('startBtn').disabled=false;
  }
  refreshScrollGate();
}
var ldoc=document.getElementById('ldoc'),scrolledEnd=false;
function refreshScrollGate(){
  if(consented){ return; }
  var sn=document.getElementById('scrollnote'), u=UI[LANG];
  sn.textContent=scrolledEnd?u.scrollDone:u.scrollHint;
  document.getElementById('consentRow').classList.toggle('disabled',!scrolledEnd);
}
ldoc.addEventListener('scroll',function(){
  if(ldoc.scrollTop+ldoc.clientHeight>=ldoc.scrollHeight-8){ if(!scrolledEnd){ scrolledEnd=true; refreshScrollGate(); } }
});
document.getElementById('agree').addEventListener('change',function(){
  document.getElementById('startBtn').disabled=!this.checked;
});
document.getElementById('startBtn').addEventListener('click',startExperience);

function startExperience(){
  unlockAudio();
  try{ localStorage.setItem('retune_consent','1'); }catch(e){}
  var lg=document.getElementById('legal'); lg.classList.add('fade-out');
  setTimeout(function(){ lg.classList.add('hidden'); lg.classList.remove('fade-out'); },1000);
  if(!modelReady){ document.getElementById('loading').style.display='flex'; }
  ringBell();
  // small delay so the bell breathes before narration
  setTimeout(beginPlay,1400);
}
function beginPlay(){
  started=true; ended=false; elapsed=0; playing=true; paused=false; lastT=null; lastLine=null;
  resetDouble();
  if(mixerDouble){ try{ mixerDouble.stopAllAction(); }catch(e){} }
  doubleAction=null; doubleSwitchAt=0; doubleFloatReroll=1e9; doubleFlightWant=false; curDoubleFly=false;
  startBGM();
  document.getElementById('hud').style.opacity='1';
  document.getElementById('ctrl').style.display='flex';
  document.getElementById('bp').textContent=UI[LANG].pause;
}
function finishExperience(){
  playing=false; ended=true; stopNarration(); stopBGM();
  showLine(null); showBreath(false);
  document.getElementById('hud').style.opacity='0';
  document.getElementById('ctrl').style.display='none';
  ringBell();
  setTimeout(function(){ document.getElementById('end').classList.remove('hidden'); },1600);
}

// controls
document.getElementById('bp').addEventListener('click',function(){
  if(!started)return; paused=!paused; this.textContent=paused?UI[LANG].resume:UI[LANG].pause;
  if(paused){ stopNarration(); try{ if(bgmAudio) bgmAudio.pause(); }catch(e){} }   // keep the binaural track in sync
  else { lastLine=null; try{ if(bgmAudio) bgmAudio.play().catch(function(){}); }catch(e){} }
});
document.getElementById('br').addEventListener('click',function(){ location.reload(); });
document.getElementById('againBtn').addEventListener('click',function(){
  document.getElementById('end').classList.add('hidden'); beginPlay();
});

window.addEventListener('resize',function(){ var w=document.getElementById('wrap');
  W3=w.clientWidth;H3=w.clientHeight; renderer.setSize(W3,H3); cam.aspect=W3/H3; cam.updateProjectionMatrix(); });

applyLang();
lookFrom(sph(0.4,0.3,5.5));
requestAnimationFrame(animate);
</script>
</body>
